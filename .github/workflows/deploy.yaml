name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pulumi/actions@v7
        with:
          command: up
          stack-name: holochain/github
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.HRA2_PULUMI_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.HRA2_GITHUB_TOKEN }}
